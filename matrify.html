<!DOCTYPE html>

<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrify-Matrizen</title>
  <link rel="stylesheet" href="CSS/matrify.css">
</head>

<body>
  <header>
    <div class="header-top">
      <nav class="nav-left" aria-label="Navigation links">
        <ul class="nav-list">
          <li><a href="index.html">Start</a></li>
          <li><a href="matrify.html">Matrizen</a></li>
        </ul>
      </nav>
      <h1>Matrify</h1>
      <nav class="nav-right" aria-label="Navigation rechts">
        <ul class="nav-list">
          <li><a href="minispiel.html">Minispiel</a></li>
          <li><a href="impressum.html">Impressum</a></li>
        </ul>
      </nav>
    </div>

    <div class="text-center">Graphisches Interface für CSV-Matrizen und Matrix-Methoden.</div>
  </header>

  
  <div class="container">
    <section class="panel">
      <h2>CSV Import</h2>
      <div class="import-area">
        <input id="fileInput" type="file" accept=".csv" multiple />
        <button id="loadButton">CSV-Dateien importieren</button>
      </div>
      <p class="hint">Wählen Sie eine oder mehrere CSV-Dateien aus. Jede Datei wird als eigene Matrix gespeichert.</p>
    </section>

    <section class="panel">
      <h2>Matrix-Übersicht</h2>
      <div id="matrixGrid" class="matrix-grid"></div>
      <div id="generalStatus" class="status"></div>
    </section>

    <section class="panel">
      <h2>Ausgabe</h2>
      <div id="outputPanel" class="output-panel">Ergebnisse werden hier angezeigt.</div>
    </section>
  </div>

  <script src="js/matrixHTML.js"></script>

</body>
</html>
