<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TapBlock</title>

<link rel="stylesheet" href="CSS/matrify.css">
<link rel="stylesheet" href="CSS/tapblock.css">
<script defer src="js/tapblock.js"></script>
</head>

<body>

  <header>
    <div class="header-top">
      <nav class="nav-left" aria-label="Navigation links">
        <ul class="nav-list">
          <li><a href="index.html">Start</a></li>
          <li><a href="matrify.html">Matrizen</a></li>
          <li><a href="minispiel.html">Minispiel</a></li>
        </ul>
      </nav>
      <h1>Matrify</h1>
      <nav class="nav-right" aria-label="Navigation rechts">
        <ul class="nav-list">
          <li><a href="impressum.html">Impressum</a></li>
          <li><a href="tapblock.html">Ablenkung</a></li>
        </ul>
      </nav>
    </div>

    <p> <div class="text-center">Graphisches Interface für CSV-Matrizen und Matrix-Methoden.</div></p>
  </header>

<div class="ui">
    <div>Level: <span id="level">1</span></div>
    <div>Punkte: <span id="score">0</span></div>
    <div>Leben: <span id="lives">3</span></div>
    <div>Game Over bei zu vielen Fehlern!</div>
</div>

<div class="controls">
    Steuerung: ← springt links, → springt rechts | ↓ schneller fallen
</div>

<canvas id="game"></canvas>

<dialog id="gameOverDialog">
    <h2>Game Over!</h2>
    <p>Punkte: <span id="finalScore">0</span></p>
    <button id="restartBtn">Neustart</button>
</dialog>

<button class="theme-toggle" id="themeToggle" aria-label="Light/Dark Mode">☀</button>

</body>
</html>
